<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}xMei-Pj{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="{{ url_for('static', filename='img/logo1.png') }}">
</head>
<body class="min-h-screen flex flex-col bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100 font-sans">

  {% include 'components/_sidebar.html' %}

  <button id="hamburger-button" class="fixed top-4 left-4 z-40 p-2 rounded-md text-slate-700 bg-slate-200/50 backdrop-blur-sm hover:bg-slate-300/70 dark:text-slate-200 dark:bg-slate-800/50 dark:hover:bg-slate-700/70 lg:hidden">
    <svg id="hamburger-icon" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
    <svg id="close-icon" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
  </button>

  <div class="lg:pl-64 transition-all duration-300 ease-in-out flex-1 flex flex-col">
    {% include 'components/_header.html' %}

    <main class="relative flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
      <div class="pointer-events-none absolute inset-0 -z-10 bg-gradient-to-b from-blue-50 via-white to-green-50 dark:from-slate-950 dark:via-slate-900 dark:to-slate-950"></div>
      {% block content %}{% endblock %}
    </main>

    {% include 'components/_footer.html' %}
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
