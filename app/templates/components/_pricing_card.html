<div class="p-4 rounded-xl bg-white dark:bg-slate-800 border {% if popular %}border-amber-400 ring-1 ring-amber-400/20 lg:scale-105{% else %}border-slate-200 dark:border-slate-700{% endif %} flex flex-col transition-all">
    
    {% if popular %}
    <span class="bg-amber-400 text-[8px] font-black uppercase px-2 py-0.5 rounded-full self-start mb-2 text-slate-900">Mais Popular</span>
    {% endif %}

    <h3 class="text-sm font-black text-blue-600 dark:text-blue-400 uppercase tracking-widest">{{ nome }}</h3>
    
    <div class="my-2 flex items-baseline gap-1">
        <span class="text-xl font-black dark:text-white font-mono">{{ preco }}</span>
        <span class="text-[9px] text-slate-400 font-bold uppercase">{{ periodo }}</span>
    </div>

    <ul class="flex-grow space-y-1.5 mb-4 text-slate-500 dark:text-slate-400 font-bold text-[10px] uppercase tracking-tighter">
        {% for feature in features %}
        <li class="flex items-center gap-2">
            <i class="fa-solid fa-check text-[8px] {% if popular %}text-amber-500{% else %}text-emerald-500{% endif %}"></i>
            {{ feature }}
        </li>
        {% endfor %}
    </ul>

    <a href="{{ link|default('#') }}" class="w-full py-2.5 text-center text-[10px] font-black rounded-lg uppercase tracking-widest transition-all
        {% if popular %} bg-amber-400 text-slate-900 hover:bg-amber-500 
        {% else %} bg-slate-100 dark:bg-slate-700 hover:bg-blue-600 hover:text-white {% endif %}">
        {{ botao_texto }}
    </a>
</div>
