<div class="flex-1 text-center lg:text-left space-y-4 py-8">
    <h1 class="text-2xl md:text-3xl font-black text-blue-600 dark:text-blue-400 leading-[1.1] uppercase tracking-tighter">
        {{ titulo }}
    </h1>
    <p class="text-sm md:text-base text-slate-500 dark:text-slate-300 max-w-xl font-bold uppercase tracking-tight leading-relaxed">
        {{ subtitulo }}
    </p>
    {% if cta_text %}
    <div class="pt-4">
        <a href="{{ cta_link }}" class="inline-block px-8 py-4 bg-blue-600 text-white font-black rounded-xl shadow-lg shadow-blue-500/30 hover:bg-blue-700 transition-all text-sm uppercase tracking-widest">
            {{ cta_text }}
        </a>
    </div>
    {% endif %}
</div>
