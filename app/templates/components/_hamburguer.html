<!-- Botão Hambúrguer para Abrir/Fechar a Sidebar -->
<button id="hamburger-button" 
        class="fixed top-4 left-4 z-20 p-2 rounded-md text-slate-700 bg-slate-200/50 backdrop-blur-sm 
               hover:bg-slate-300/70 dark:text-slate-200 dark:bg-slate-800/50 dark:hover:bg-slate-700/70 
               lg:hidden">  <!-- A MÁGICA ESTÁ AQUI: lg:hidden esconde o botão em telas grandes -->
    
    <!-- Ícone de Hambúrguer (três linhas) -->
    <svg id="hamburger-icon" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
    </svg>

    <!-- Ícone de Fechar (X), escondido por padrão -->
    <svg id="close-icon" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
    </svg>
</button>
