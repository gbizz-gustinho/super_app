<div class="mb-3">
    {% if label %}
    <label class="block text-[11px] font-black text-blue-600 dark:text-blue-300 mb-1.5 uppercase tracking-widest">{{ label }}</label>
    {% endif %}
    <div class="relative">
        <input type="{{ type|default('text') }}" 
               name="{{ name }}" 
               id="{{ id|default(name) }}"
               placeholder="{{ placeholder|upper }}" 
               {% if required %}required{% endif %}
               class="w-full p-3.5 bg-gray-50 dark:bg-slate-700 border border-gray-200 dark:border-slate-600 rounded-xl text-sm text-gray-900 dark:text-white dark:placeholder-slate-400 font-bold focus:ring-2 focus:ring-blue-500 outline-none transition uppercase">
        
        {% if type == 'password' %}
        <button type="button" onclick="togglePassword('{{ id|default(name) }}')" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-500 transition-colors">
            <i class="fa-solid fa-eye text-sm"></i>
        </button>
        {% endif %}
    </div>
</div>
