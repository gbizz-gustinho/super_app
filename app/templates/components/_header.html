<header class="sticky top-0 z-30 bg-white/70 dark:bg-slate-900/70 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
  <div class="h-16 flex items-center justify-between px-4 md:px-8">
    <a href="{{ url_for('site_bp.index') }}" class="shrink-0 text-xl font-bold text-slate-800 dark:text-white tracking-tight">
      xMei-Pj
    </a>

    <div class="hidden lg:flex items-center gap-6">
      <nav class="flex items-center gap-6">
        <a href="{{ url_for('site_bp.funcionalidades') }}" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">Funcionalidades</a>
        <a href="{{ url_for('site_bp.beneficios') }}" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">Benefícios</a>
        <a href="{{ url_for('site_bp.precos') }}" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">Preços</a>
        <a href="{{ url_for('site_bp.contato') }}" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">Contato</a>
      </nav>

      <div class="flex items-center gap-2">
        {% if session.get('user_id') %}
          <span class="hidden sm:block text-xs font-semibold text-slate-600 dark:text-slate-300 truncate max-w-">{{ session.get('username') }}</span>
          <a href="#" class="text-red-500 hover:scale-110 transition"><i class="fa-solid fa-power-off text-sm"></i></a>
        {% else %}
          <a href="{{ url_for('auth.login') }}" class="px-3 py-2 rounded-md text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800">Entrar</a>
          <a href="{{ url_for('site_bp.cadastro_gratis') }}" class="ml-1 inline-flex items-center justify-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700">Teste Grátis ✨</a>
        {% endif %}
      </div>
    </div>
  </div>
</header>
